# Render Blueprint (optional — manual "New + → Web Service" works the same).
# Free plan: no persistent disk, so data lives in an external Postgres
# (free at https://neon.tech) — paste its connection string as DATABASE_URL.
services:
  - type: web
    name: unfog
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
