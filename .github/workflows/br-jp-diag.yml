name: br-jp-diag

# One-shot diagnostic (manual): why aren't Brazil Série A / J-League showing on
# the site? Checks (a) does The Odds API even have live events for these sport
# keys right now (via the existing 1-credit /api/diag/books probe), (b) the
# last collection log, (c) whether they're present in /api/value-bets output.
# Reads only.
on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake app + probe Brazil/Japan sport keys directly
        run: |
          BASE=https://beetingapp-1.onrender.com
          echo "--- wake ---"
          curl -fsS -m 90 "$BASE/healthz" || true; echo
          echo "--- quota ---"
          curl -fsS -m 60 "$BASE/api/diag/quota" || true; echo
          echo "--- probe soccer_brazil_campeonato (1 credit: does the API have live events right now?) ---"
          curl -fsS -m 60 "$BASE/api/diag/books?sport=soccer_brazil_campeonato" || true; echo
          echo "--- probe soccer_japan_j_league (1 credit) ---"
          curl -fsS -m 60 "$BASE/api/diag/books?sport=soccer_japan_j_league" || true; echo
          echo "--- last collection log ---"
          curl -fsS -m 60 "$BASE/api/collection/status" || true; echo
      - name: Check /api/value-bets for Brazil/Japan events (before refresh)
        run: |
          BASE=https://beetingapp-1.onrender.com
          curl -fsS -m 60 "$BASE/api/value-bets" -o /tmp/vb_before.json || true
          python3 - <<'EOF'
          import json
          try:
              d = json.load(open("/tmp/vb_before.json"))
          except Exception as e:
              print("parse error:", e); raise SystemExit(0)
          print(f"[BEFORE] total value-bets events: {len(d)}")
          sports = sorted(set(e.get("sport_key") for e in d))
          print("[BEFORE] all sport_keys present in value-bets:", sports)
          EOF
      - name: Trigger a fast odds refresh (same as the site's Refresh button)
        run: |
          BASE=https://beetingapp-1.onrender.com
          echo "--- POST /api/odds/refresh (root-cause fix: no collection has run on this instance since restart) ---"
          curl -fsS -m 60 -X POST "$BASE/api/odds/refresh" || true; echo
          echo "waiting 90s for the fast refresh (fetches live odds + recomputes value bets)..."
          sleep 90
          echo "--- collection status after refresh ---"
          curl -fsS -m 60 "$BASE/api/collection/status" || true; echo
      - name: Check /api/value-bets for Brazil/Japan events (after refresh)
        run: |
          BASE=https://beetingapp-1.onrender.com
          curl -fsS -m 60 "$BASE/api/value-bets" -o /tmp/vb_after.json || true
          python3 - <<'EOF'
          import json
          try:
              d = json.load(open("/tmp/vb_after.json"))
          except Exception as e:
              print("parse error:", e); raise SystemExit(0)
          print(f"[AFTER] total value-bets events: {len(d)}")
          sports = sorted(set(e.get("sport_key") for e in d))
          print("[AFTER] all sport_keys present in value-bets:", sports)
          br = [e for e in d if e.get("sport_key") == "soccer_brazil_campeonato"]
          jp = [e for e in d if e.get("sport_key") == "soccer_japan_j_league"]
          print(f"[AFTER] Brazil events in value-bets: {len(br)}")
          print(f"[AFTER] Japan events in value-bets: {len(jp)}")
          for e in (br + jp)[:10]:
              bv = e.get("best_value") or {}
              print(" ", e.get("sport_key"), e.get("home_team"), "v", e.get("away_team"),
                    e.get("commence_time"), "| best_value:", bv.get("selection"), bv.get("book"),
                    bv.get("book_odd"), "edge", bv.get("edge_pct"))
          EOF
