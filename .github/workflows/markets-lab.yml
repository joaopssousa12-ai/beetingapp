name: markets-lab

# On-demand analysis (manual trigger only): Over/Under 2.5 + Asian Handicap
# backtests vs the 1X2 baseline on the validated leagues. No product changes.
on:
  workflow_dispatch: {}

jobs:
  markets-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: O/U 2.5 + Asian Handicap vs 1X2 baseline
        run: python scripts/markets_analysis.py
