<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ home_team }} vs {{ away_team }} — BetIQ</title>
<link rel="stylesheet" href="/static/css/style.css?v=20260608l">
<style>
  .md-back { display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; color: var(--accent); text-decoration: none; font-weight: 500; font-size: 14px; }
  .md-back:hover { text-decoration: underline; }

  .md-header { background: linear-gradient(to right, var(--card-bg), var(--bg)); border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
  .md-comp { color: var(--text3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
  .md-teams { display: flex; align-items: center; gap: 2rem; font-size: 28px; font-weight: 600; flex-wrap: wrap; }
  .md-vs { color: var(--text3); font-size: 16px; }
  .md-time { color: var(--text3); font-size: 14px; margin-top: 0.5rem; }

  .md-section { background: var(--card-bg); border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid var(--border); }
  .md-section-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }

  /* honest, load-bearing banner: this whole page is NOT the edge system */
  .md-info-banner { background: #eef4ff; border: 1px solid #b9d3ff; border-left: 4px solid #4A90E2; color: #1c3d6e; border-radius: 8px; padding: 0.9rem 1.1rem; font-size: 13px; line-height: 1.55; margin-bottom: 1.25rem; }
  [data-theme="dark"] .md-info-banner { background: #12233d; border-color: #2b4a78; color: #cfe0ff; }
  .md-warn-banner { background: #fff6e6; border: 1px solid #ffd591; border-left: 4px solid #F39C12; color: #7a4d00; border-radius: 8px; padding: 0.8rem 1.05rem; font-size: 12.5px; line-height: 1.5; margin-top: 0.75rem; }
  [data-theme="dark"] .md-warn-banner { background: #33280f; border-color: #6b521c; color: #ffdfa6; }

  .md-prob-bar { display: flex; height: 38px; border-radius: 6px; overflow: hidden; margin: 1rem 0; }
  .md-prob-segment { display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; }
  .md-prob-home { background: #4A90E2; }
  .md-prob-draw { background: #7F8C8D; }
  .md-prob-away { background: #E67E22; }
  .md-prob-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-top: 4px; flex-wrap: wrap; gap: 4px; }

  .md-pick-box { background: linear-gradient(135deg, var(--card-bg), var(--bg)); border: 2px solid #4A90E2; border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
  .md-pick-title { font-size: 12px; font-weight: 700; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); }
  .md-pick-selection { font-size: 24px; font-weight: 700; margin-bottom: 0.5rem; }
  .md-pick-meta { display: flex; gap: 1.25rem; font-size: 13px; color: var(--text2); flex-wrap: wrap; align-items: center; }
  .md-tier { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .md-tier.Alta { background: #d4edda; color: #155724; }
  .md-tier.Média-alta { background: #d1ecf1; color: #0c5460; }
  .md-tier.Média { background: #fff3cd; color: #856404; }
  .md-tier.Baixa { background: #f8d7da; color: #721c24; }

  .md-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
  .md-stat { background: var(--bg); border-radius: 6px; padding: 0.85rem; text-align: center; }
  .md-stat-label { font-size: 10px; text-transform: uppercase; color: var(--text3); margin-bottom: 0.3rem; }
  .md-stat-value { font-size: 18px; font-weight: 600; }

  .md-form { display: flex; gap: 2rem; flex-wrap: wrap; }
  .md-form-col { flex: 1; min-width: 200px; }
  .md-form-team { font-weight: 600; margin-bottom: 0.4rem; }
  .md-form-pills { display: flex; gap: 4px; margin-top: 0.4rem; }
  .md-pill { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }
  .md-pill.W { background: #27AE60; } .md-pill.D { background: #95A5A6; } .md-pill.L { background: #E74C3C; }
  .md-strength { font-size: 12px; color: var(--text2); }

  .md-scoreline { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .md-scoreline:last-child { border-bottom: none; }
  .md-h2h-row { display: flex; justify-content: space-between; padding: 0.35rem 0; font-size: 13px; color: var(--text2); border-bottom: 1px dashed var(--border); }

  .md-loading { text-align: center; padding: 4rem 1rem; color: var(--text3); }
</style>
</head>
<body>
<div class="container" style="max-width: 1000px; margin: 2rem auto; padding: 0 1rem;">
  <a href="/" class="md-back">← Voltar aos jogos</a>

  <div class="md-header">
    <div class="md-comp">{{ sport_name }}</div>
    <div class="md-teams">
      <span>{{ home_team }}</span>
      <span class="md-vs">vs</span>
      <span>{{ away_team }}</span>
    </div>
    <div class="md-time">{{ commence_time }}</div>
  </div>

  <div id="match-content"><div class="md-loading">A carregar análise…</div></div>
</div>

<script>
const eventId = "{{ event_id }}";
const HOME = "{{ home_team }}", AWAY = "{{ away_team }}";

async function loadMatch() {
  try {
    const resp = await fetch(`/api/match/${eventId}/prognosis`);
    const d = await resp.json();
    if (!d || d.error) {
      document.getElementById('match-content').innerHTML =
        '<div class="md-section">Análise indisponível para este jogo.</div>';
      return;
    }
    document.getElementById('match-content').innerHTML = render(d);
  } catch (e) {
    document.getElementById('match-content').innerHTML =
      '<div class="md-section">Erro ao carregar: ' + e.message + '</div>';
  }
}

function fairOdd(p) { return p > 0 ? (100 / p).toFixed(2) : '—'; }

function render(d) {
  const elo = d.elo, poi = d.poisson, home = d.home_team, away = d.away_team;
  const probs = d.probs, basis = d.basis || 'Elo';

  // Honesty banner — this page is context, NOT the edge/CLV system.
  let html = `<div class="md-info-banner">
    <strong>Análise do modelo — informativa.</strong> Isto diz-te <em>em quem o modelo acha que devias apostar</em>
    (Elo + mercado + forma + confrontos + golos), para contexto e diversão. <strong>Não</strong> é uma recomendação
    de valor: o sistema de edge/CLV (semáforo 🟢) vive na página <strong>Value Bets</strong> e é independente disto.
    A confiança vem da fusão Elo + linha sharp, o sinal mais preciso e calibrado no backtest (27.844 jogos).
  </div>`;

  // === MELHOR PALPITE + CONFIANÇA ===
  if (d.best_pick && d.confidence != null) {
    const tier = d.confidence_tier || 'Média';
    const agr = d.agreement === true ? '✓ modelo de golos concorda'
              : d.agreement === false ? '⚠ modelo de golos discorda' : '';
    html += `<div class="md-pick-box">
      <div class="md-pick-title">🎯 Melhor palpite do modelo</div>
      <div class="md-pick-selection">${d.best_pick.selection}</div>
      <div class="md-pick-meta">
        <span class="md-tier ${tier}">Confiança: ${tier}</span>
        <span>Probabilidade (${basis}): <strong>${d.confidence}%</strong> (odd justa ${fairOdd(d.confidence)})</span>
        ${agr ? `<span>${agr}</span>` : ''}
      </div>
      ${(d.notes && d.notes.length) ? `<div class="md-warn-banner">${d.notes.join(' ')}</div>` : ''}
    </div>`;
  }

  // === PROBABILIDADES DO MODELO (blend Elo + mercado) ===
  if (probs) {
    const h = probs.home || 0, dr = probs.draw || 0, a = probs.away || 0;
    html += `<div class="md-section">
      <div class="md-section-title">📈 Probabilidades do modelo <span style="font-size:11px;color:var(--text3);font-weight:400">(${basis})</span></div>
      <div class="md-prob-bar">
        <div class="md-prob-segment md-prob-home" style="width:${h}%">${h > 8 ? h + '%' : ''}</div>
        ${dr ? `<div class="md-prob-segment md-prob-draw" style="width:${dr}%">${dr > 8 ? dr + '%' : ''}</div>` : ''}
        <div class="md-prob-segment md-prob-away" style="width:${a}%">${a > 8 ? a + '%' : ''}</div>
      </div>
      <div class="md-prob-labels">
        <span>${home}: ${h}% (${fairOdd(h)})</span>
        ${dr ? `<span>Empate: ${dr}% (${fairOdd(dr)})</span>` : ''}
        <span>${away}: ${a}% (${fairOdd(a)})</span>
      </div>
      ${elo ? `<div class="md-prob-labels" style="color:var(--text3)">
        <span>Elo: ${elo.rating_home ?? '—'} vs ${elo.rating_away ?? '—'} (dif ${elo.rating_diff ?? '—'}) — Elo puro: ${elo.home ?? '—'}%${elo.draw != null ? ' / ' + elo.draw + '%' : ''} / ${elo.away ?? '—'}%</span>
      </div>` : ''}
      ${d.market ? `<div class="md-prob-labels" style="color:var(--text3)">
        <span>Mercado (Pinnacle sem margem): ${d.market.home ?? '—'}%${d.market.draw != null ? ' / ' + d.market.draw + '%' : ''} / ${d.market.away ?? '—'}%</span>
      </div>` : ''}
    </div>`;
  }

  // === MERCADOS MAIS PROVÁVEIS ===
  if (d.markets && d.markets.length) {
    const rows = d.markets.map((m, i) => `
      <div class="md-scoreline" style="${i === 0 ? 'font-weight:700' : ''}">
        <span>${i === 0 ? '🥇 ' : ''}${m.market} — ${m.selection}${m.note ? ` <span style="font-size:11px;color:var(--text3)">(${m.note})</span>` : ''}${m.auxiliary ? ' <span style="font-size:10px;color:#b45309">aux.</span>' : ''}</span>
        <span>${m.prob}%</span>
      </div>`).join('');
    html += `<div class="md-section">
      <div class="md-section-title">🎯 Mercados mais prováveis <span style="font-size:11px;color:var(--text3);font-weight:400">(ordenados por probabilidade do modelo)</span></div>
      ${rows}
      <div style="font-size:11.5px;color:var(--text3);margin-top:0.6rem;line-height:1.5">
        Probabilidade alta ⇒ odd baixa — o mercado já cobra por isso. "aux." = vem do modelo de golos (sinal mais fraco).
      </div>
    </div>`;
  }

  // === FORMA RECENTE ===
  if (d.form && (d.form.home || d.form.away)) {
    html += `<div class="md-section">
      <div class="md-section-title">🔥 Forma recente</div>
      <div class="md-form">
        ${formCol(home, d.form.home)}
        ${formCol(away, d.form.away)}
      </div>
    </div>`;
  }

  // === CONFRONTOS DIRETOS (H2H) ===
  if (d.h2h && d.h2h.n) {
    const rows = d.h2h.matches.map(m =>
      `<div class="md-h2h-row"><span>${(m.date||'').slice(0,10)}</span>
       <span>${m.home_team} ${m.home_goals}–${m.away_goals} ${m.away_team}</span></div>`).join('');
    html += `<div class="md-section">
      <div class="md-section-title">⚔️ Confrontos diretos (${d.h2h.n})</div>
      <div class="md-stats-grid" style="margin-bottom:0.75rem">
        <div class="md-stat"><div class="md-stat-label">${home}</div><div class="md-stat-value">${d.h2h.home_wins}</div></div>
        <div class="md-stat"><div class="md-stat-label">Empates</div><div class="md-stat-value">${d.h2h.draws}</div></div>
        <div class="md-stat"><div class="md-stat-label">${away}</div><div class="md-stat-value">${d.h2h.away_wins}</div></div>
      </div>
      ${rows}
    </div>`;
  }

  // === GOLOS (Poisson) ===
  if (poi) {
    const sl = (poi.top_scorelines || []).map(s =>
      `<div class="md-scoreline"><span>${s.score}</span><span>${s.prob}%</span></div>`).join('');
    html += `<div class="md-section">
      <div class="md-section-title">⚽ Golos & resultados prováveis <span style="font-size:11px;color:var(--text3);font-weight:400">(modelo de golos — auxiliar)</span></div>
      <div class="md-stats-grid" style="margin-bottom:0.75rem">
        <div class="md-stat"><div class="md-stat-label">Over 2.5</div><div class="md-stat-value">${poi.over25}%</div></div>
        <div class="md-stat"><div class="md-stat-label">Under 2.5</div><div class="md-stat-value">${poi.under25}%</div></div>
        <div class="md-stat"><div class="md-stat-label">Ambas marcam</div><div class="md-stat-value">${poi.btts_yes}%</div></div>
        <div class="md-stat"><div class="md-stat-label">Golos esperados</div><div class="md-stat-value">${poi.lambda_home}–${poi.lambda_away}</div></div>
      </div>
      ${sl ? `<div style="font-size:12px;color:var(--text3);margin-bottom:0.4rem">Resultados mais prováveis</div>${sl}` : ''}
      <div class="md-warn-banner">O modelo de golos é <strong>sobreconfiante</strong> no 1X2 (por isso a confiança principal
      vem do Elo, não daqui). Serve para O/U, ambas-marcam e forma do resultado.</div>
    </div>`;
  }

  return html;
}

function formCol(team, f) {
  if (!f || f.matches_analyzed === 0) {
    return `<div class="md-form-col"><div class="md-form-team">${team}</div>
      <div class="md-strength">Sem dados recentes suficientes.</div></div>`;
  }
  return `<div class="md-form-col">
    <div class="md-form-team">${team}</div>
    <div class="md-strength">${f.form_strength} · ${f.wins}V ${f.draws}E ${f.losses}D
      (${f.points}/${f.max_possible} pts em ${f.matches_analyzed})</div>
  </div>`;
}

loadMatch();
</script>
</body>
</html>
